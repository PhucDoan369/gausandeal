<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gấu Săn Deal - Tổng Hợp Deal Chất Shopee</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --primary: #ee4d2d;
            --bg: #fff5f3 ;
            --text: #333;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; text-align: center; }
        
        /* Header */
        .profile { margin-bottom: 30px; }
        .avatar { width: 100px; height: 100px; border-radius: 50%; border: 4px solid white; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; object-fit: cover; }
        .name { font-size: 22px; font-weight: 800; color: #000; margin-bottom: 5px; }
        .bio { font-size: 14px; color: #666; line-height: 1.5; }

        /* Search */
        .search-box { position: sticky; top: 10px; z-index: 100; margin-bottom: 25px; }
        .search-box input { width: 100%; padding: 15px 20px; border-radius: 30px; border: none; box-shadow: 0 4px 15px rgba(0,0,0,0.1); outline: none; font-size: 16px; }

        /* Link List */
        .links-container { display: flex; flex-direction: column; gap: 15px; }
        .link-card { 
            background: white; 
            padding: 12px; 
            border-radius: 15px; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            transition: transform 0.2s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .link-card:active { transform: scale(0.98); }
        .link-img { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; }
        .link-info { text-align: left; flex-grow: 1; }
        .link-title { font-weight: 600; font-size: 15px; color: #000; margin-bottom: 4px; }
        .link-price { color: var(--primary); font-weight: 800; font-size: 14px; }
        .link-price span { text-decoration: line-through; color: #999; font-weight: 400; font-size: 12px; margin-left: 8px; }
        .btn-buy { background: var(--primary); color: white; padding: 8px 15px; border-radius: 8px; font-size: 13px; font-weight: 600; }

        /* Footer */
        footer { margin-top: 50px; font-size: 12px; color: #999; padding-bottom: 30px; }
        .social-icons { margin-top: 15px; display: flex; justify-content: center; gap: 20px; font-size: 20px; }
        .social-icons a { color: #555; }
    </style>
</head>
<body>

    <div class="container">
        <div class="profile">
            <img src="./images/daidien.png" alt="Gấu Săn Deal" class="avatar">
            <h1 class="name">Gấu Săn Deal 🐾</h1>
            <p class="bio">Chỉ gom hàng CHẤT - Giá rẻ nhất Shopee<br>Lọc deal có tâm, review chân thực!</p>
        </div>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Tìm tên sản phẩm hoặc mã...">
        </div>

        <div class="links-container" id="linksList">
            <p>Đang tải deal hời...</p>
        </div>

        <footer>
            <div class="social-icons">
                <a href="https://www.facebook.com/profile.php?id=61589490230321"><i class="fa-brands fa-facebook"></i></a>
                <a href="#"><i class="fa-brands fa-tiktok"></i></a>
                <a href="#"><i class="fa-solid fa-envelope"></i></a>
            </div>
            <p>© 2026 Gấu Săn Deal - Affiliate Team</p>
        </footer>
    </div>

    <script>
    let myDeals = []; // Khởi tạo mảng rỗng

    // Hàm đọc dữ liệu từ file JSON
    async function loadDeals() {
        try {
            // Thêm tham số thời gian để tránh trình duyệt lưu cache file cũ
            // Thêm tham số ngẫu nhiên để buộc trình duyệt luôn tải file mới nhất
    const response = await fetch('deals.json?nocache=' + new Date().getTime());
            myDeals = await response.json();
            renderDeals(); // Vẽ giao diện sau khi đã có dữ liệu
        } catch (error) {
            console.error("Lỗi khi đọc file deal:", error);
            document.getElementById('linksList').innerHTML = "<p>Không thể tải danh sách deal hời, vui lòng thử lại!</p>";
        }
    }

    function renderDeals(filter = "") {
        const list = document.getElementById('linksList');
        list.innerHTML = "";
        
        const filtered = myDeals.filter(d => d.title.toLowerCase().includes(filter.toLowerCase()));

        if(filtered.length === 0) {
            list.innerHTML = "<p>Không tìm thấy deal nào rồi bạn ơi!</p>";
            return;
        }

        filtered.forEach(deal => {
            const card = `
                <a href="${deal.url}" target="_blank" class="link-card">
                    <img src="${deal.img}" class="link-img">
                    <div class="link-info">
                        <div class="link-title">${deal.title}</div>
                        <div class="link-price">${deal.price} <span>${deal.oldPrice}</span></div>
                    </div>
                    <div class="btn-buy">MUA</div>
                </a>
            `;
            list.innerHTML += card;
        });
    }

    // Sự kiện tìm kiếm
    document.getElementById('searchInput').addEventListener('input', (e) => {
        renderDeals(e.target.value);
    });

    // Gọi hàm load dữ liệu khi trang web chạy
    loadDeals();
</script>

</body>
</html>
